name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller --onefile --name log-analyzer --hidden-import jsonschema --hidden-import jsonschema.validators --hidden-import jsonschema._validators --hidden-import jsonschema._legacy_validators --hidden-import jsonschema.exceptions analyze/__main__.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/log-analyzer.exe
